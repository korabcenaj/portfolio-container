---
# MetalLB Layer 2 Configuration
# This configures MetalLB to announce ingress IP addresses on the local network
# Requires: MetalLB installed (https://metallb.universe.tf/)

apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: first-pool
  namespace: metallb-system
spec:
  addresses:
  - 192.168.1.240-192.168.1.250  # Update to match your network range
  # For a single IP: 192.168.1.245/32

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-adv
  namespace: metallb-system
spec:
  ipAddressPools:
  - first-pool
